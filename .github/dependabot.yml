version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      minor-patches:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/supabase/functions/generate-pdf-report"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      minor-patches:
        update-types: ["minor", "patch"]
